<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookStream | Professional Library Manager</title>
    <!-- Tailwind CSS for Modern Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <!-- Header / Navbar -->
    <header class="bg-indigo-700 text-white shadow-md p-5">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
                <h1 class="text-2xl font-bold tracking-tight">BookStream <span class="text-indigo-200 font-light">Manager</span></h1>
            </div>
            <div class="flex items-center space-x-6">
                <div class="hidden md:flex flex-col text-right border-r border-indigo-400 pr-4">
                    <span class="text-[10px] uppercase tracking-widest text-indigo-300 font-bold">Developer Profile</span>
                    <span class="text-sm font-medium text-white italic">daniyalahmadkirmani (23474)</span>
                </div>
                <div id="stats" class="hidden sm:block text-sm bg-indigo-800 border border-indigo-400/30 px-4 py-1 rounded-full shadow-inner">
                    Total Books: <span id="bookCount" class="font-bold text-indigo-200">0</span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        
        <!-- Status Notifications -->
        <div id="notification" class="hidden mb-6 p-4 rounded-lg shadow-sm text-center font-medium transform transition-all duration-300"></div>

        <div class="grid grid-cols-1 xl:grid-cols-4 gap-8">
            
            <!-- Book Entry Form Section -->
            <div class="xl:col-span-1">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                    <h2 id="formHeader" class="text-xl font-bold mb-6 text-gray-700 border-b pb-2">Add New Book</h2>
                    <form id="bookForm" class="space-y-4">
                        <input type="hidden" id="editIndex" value="-1">
                        
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Book Title</label>
                            <input type="text" id="title" placeholder="e.g. The Alchemist" required 
                                class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Author Name</label>
                            <input type="text" id="author" placeholder="e.g. Paulo Coelho" required 
                                class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Genre</label>
                                <input type="text" id="genre" placeholder="Fiction" required 
                                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">Published Year</label>
                                <input type="number" id="publishedYear" placeholder="1988" required 
                                    class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase mb-1">ISBN Number</label>
                            <input type="text" id="isbn" placeholder="978-0062315007" required 
                                class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                        </div>

                        <div class="pt-4 flex flex-col gap-2">
                            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-md transition transform active:scale-95">
                                Save Book
                            </button>
                            <button type="button" id="resetBtn" class="w-full text-gray-500 hover:text-gray-700 font-medium py-2 text-sm transition">
                                Reset Form
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Inventory Display Section -->
            <div class="xl:col-span-3">
                <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                    <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                        <h2 class="text-xl font-bold text-gray-700">Library Inventory</h2>
                        <input type="text" id="searchInput" placeholder="Search by title..." 
                            class="text-sm border border-gray-200 px-4 py-1 rounded-full outline-none focus:border-indigo-400">
                    </div>
                    
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-gray-50 text-gray-400 text-xs uppercase font-bold">
                                <tr>
                                    <th class="px-6 py-4">Book Details</th>
                                    <th class="px-6 py-4">Genre</th>
                                    <th class="px-6 py-4">Year</th>
                                    <th class="px-6 py-4">ISBN</th>
                                    <th class="px-6 py-4 text-center">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="bookTableBody" class="divide-y divide-gray-100">
                                <!-- JS will inject rows here -->
                            </tbody>
                        </table>
                    </div>

                    <!-- Empty State -->
                    <div id="emptyState" class="hidden flex flex-col items-center justify-center p-20 text-gray-400">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                        </svg>
                        <p class="text-lg">No books in the library yet.</p>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        /**
         * GLOBAL STATE & SELECTORS
         */
        const bookForm = document.getElementById('bookForm');
        const bookTableBody = document.getElementById('bookTableBody');
        const emptyState = document.getElementById('emptyState');
        const notification = document.getElementById('notification');
        const submitBtn = document.getElementById('submitBtn');
        const formHeader = document.getElementById('formHeader');
        const editIndexInput = document.getElementById('editIndex');
        const bookCountDisplay = document.getElementById('bookCount');
        const searchInput = document.getElementById('searchInput');

        // Initial Data from LocalStorage
        let books = JSON.parse(localStorage.getItem('libraryData')) || [];

        /**
         * CRUD CORE LOGIC
         */

        // Render books to the table
        function renderBooks(filter = '') {
            bookTableBody.innerHTML = '';
            const filteredBooks = books.filter(b => b.title.toLowerCase().includes(filter.toLowerCase()));
            
            if (filteredBooks.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                filteredBooks.forEach((book, index) => {
                    const row = document.createElement('tr');
                    row.className = "hover:bg-indigo-50/30 transition fade-in";
                    row.innerHTML = `
                        <td class="px-6 py-4">
                            <div class="font-bold text-indigo-900">${book.title}</div>
                            <div class="text-sm text-gray-500">${book.author}</div>
                        </td>
                        <td class="px-6 py-4 text-sm text-gray-600">${book.genre}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${book.publishedYear}</td>
                        <td class="px-6 py-4 text-sm font-mono text-gray-400">${book.isbn}</td>
                        <td class="px-6 py-4">
                            <div class="flex justify-center space-x-2">
                                <button onclick="prepareEdit(${index})" class="p-2 text-blue-600 hover:bg-blue-100 rounded-full transition" title="Edit Book">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z" />
                                    </svg>
                                </button>
                                <button onclick="deleteBook(${index})" class="p-2 text-red-600 hover:bg-red-100 rounded-full transition" title="Delete Book">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                                    </svg>
                                </button>
                            </div>
                        </td>
                    `;
                    bookTableBody.appendChild(row);
                });
            }
            updateStats();
        }

        // Handle Add/Update Form Submission
        bookForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const newBook = {
                title: document.getElementById('title').value.trim(),
                author: document.getElementById('author').value.trim(),
                genre: document.getElementById('genre').value.trim(),
                publishedYear: document.getElementById('publishedYear').value.trim(),
                isbn: document.getElementById('isbn').value.trim()
            };

            const editIndex = parseInt(editIndexInput.value);

            if (editIndex === -1) {
                // CREATE Logic
                books.push(newBook);
                showNotification('Great! Book added to the library.', 'bg-green-600');
            } else {
                // UPDATE Logic
                books[editIndex] = newBook;
                showNotification('Update successful!', 'bg-blue-600');
                resetFormState();
            }

            syncAndRefresh();
            bookForm.reset();
        });

        // Delete Logic
        window.deleteBook = (index) => {
            if (confirm('Are you sure you want to remove this book from records?')) {
                books.splice(index, 1);
                syncAndRefresh();
                showNotification('Book removed successfully.', 'bg-red-500');
            }
        };

        // Prepare UI for Editing
        window.prepareEdit = (index) => {
            const book = books[index];
            document.getElementById('title').value = book.title;
            document.getElementById('author').value = book.author;
            document.getElementById('genre').value = book.genre;
            document.getElementById('publishedYear').value = book.publishedYear;
            document.getElementById('isbn').value = book.isbn;
            
            editIndexInput.value = index;
            formHeader.innerText = "Edit Book Records";
            submitBtn.innerText = "Update Records";
            submitBtn.classList.replace('bg-indigo-600', 'bg-blue-600');
            
            // Scroll to form on mobile
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        /**
         * UTILITY FUNCTIONS
         */

        function syncAndRefresh() {
            localStorage.setItem('libraryData', JSON.stringify(books));
            renderBooks();
        }

        function resetFormState() {
            editIndexInput.value = "-1";
            formHeader.innerText = "Add New Book";
            submitBtn.innerText = "Save Book";
            submitBtn.classList.replace('bg-blue-600', 'bg-indigo-600');
        }

        function showNotification(msg, colorClass) {
            notification.innerText = msg;
            notification.className = `fixed bottom-5 right-5 p-4 rounded-lg text-white shadow-2xl z-50 ${colorClass} fade-in`;
            notification.classList.remove('hidden');
            
            setTimeout(() => {
                notification.classList.add('hidden');
            }, 3000);
        }

        function updateStats() {
            bookCountDisplay.innerText = books.length;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            bookForm.reset();
            resetFormState();
        });

        searchInput.addEventListener('input', (e) => {
            renderBooks(e.target.value);
        });

        // Initial Load
        window.onload = () => renderBooks();

    </script>
</body>
</html>
